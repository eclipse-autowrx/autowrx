# AutoWRX Production Deployment
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  # AutoWRX - Backend serves both API and frontend static files
  autowrx:
    # platform: linux/amd64  # Commented out for local testing on non-AMD64 machines
    container_name: ${NAME:-prod}-autowrx
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    image: ghcr.io/eclipse-autowrx/autowrx/autowrx:latest
    ports:
      - "${FRONTEND_PORT:-3200}:3200"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3200}
      # Always use port 27017 for internal Docker network communication
      # MONGODB_PORT (27010) is only for external host access
      MONGODB_URL: mongodb://autowrx-db:27017/${MONGODB_DATABASE:-autowrx}
      JWT_SECRET: ${JWT_SECRET}
      JWT_COOKIE_NAME: ${JWT_COOKIE_NAME:-token}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # ── Backup / Restore ──────────────────────────────────────────────────
      # Set RESTORE_FILE to auto-restore a backup ZIP on container startup.
      # Place the ZIP in ./data/backups/ on the host and reference it here.
      # The file is renamed to *.restored after a successful restore so it
      # does not re-run on subsequent restarts.
      # Example: RESTORE_FILE=/usr/src/playground-be/backups/restore.zip
      RESTORE_FILE: ${RESTORE_FILE:-}
      # Set RESTORE_REPLACE_ALL=1 to replace all conflicting items during restore.
      # If unset, conflicts are skipped (existing data is kept).
      RESTORE_REPLACE_ALL: ${RESTORE_REPLACE_ALL:-}
    volumes:
      - '${UPLOAD_PATH_HOST:-./data/upload}:/usr/src/playground-be/static/uploads'
      - '${PLUGIN_PATH_HOST:-./data/plugin}:/usr/src/playground-be/static/plugin'
      # Backup storage: place backup ZIPs here; set RESTORE_FILE in .env.prod to auto-restore
      - '${BACKUP_PATH_HOST:-./data/backups}:/usr/src/playground-be/backups'
    depends_on:
      autowrx-db:
        condition: service_healthy
    networks:
      - autowrx-network
    restart: always

  # MongoDB - Database
  autowrx-db:
    # platform: linux/amd64  # Commented out for local testing on non-AMD64 machines
    container_name: ${NAME:-prod}-autowrx-db
    image: mongo:4.4.6-bionic
    # ports:
    #   - "${MONGODB_PORT:-27010}:27017"
    volumes:
      - autowrx-dbdata:/data/db
    networks:
      - autowrx-network
    restart: always
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  autowrx-dbdata:
    name: ${NAME:-prod}-autowrx-dbdata

networks:
  autowrx-network:
    name: ${NAME:-prod}-autowrx-network
    driver: bridge
