# AutoWRX Production Deployment
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  # AutoWRX - Backend serves both API and frontend static files
  autowrx:
    # platform: linux/amd64  # Commented out for local testing on non-AMD64 machines
    container_name: ${NAME:-prod}-autowrx
    build:
      context: ..
      dockerfile: ./backend/Dockerfile
    image: ghcr.io/eclipse-autowrx/autowrx/autowrx:latest
    ports:
      - "${FRONTEND_PORT:-3200}:3200"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3200}
      # Always use port 27017 for internal Docker network communication
      # MONGODB_PORT (27010) is only for external host access
      MONGODB_URL: mongodb://autowrx-db:27017/${MONGODB_DATABASE:-autowrx}
      JWT_SECRET: ${JWT_SECRET}
      JWT_COOKIE_NAME: ${JWT_COOKIE_NAME:-token}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_COOKIE_DOMAIN: ${JWT_COOKIE_DOMAIN:-}
      APP_DIR: ${APP_DIR:-/usr/src/playground-be}
      INSTANCE_PATH: ${INSTANCE_PATH:-${APP_DIR:-/usr/src/playground-be}/instance}
    volumes:
      - autowrx-uploads:${APP_DIR:-/usr/src/playground-be}/static/uploads
      - autowrx-plugins:${APP_DIR:-/usr/src/playground-be}/static/plugin
      - autowrx-builtin-widgets:${APP_DIR:-/usr/src/playground-be}/static/builtin-widgets
      - autowrx-vss-data:${APP_DIR:-/usr/src/playground-be}/data
      # Instance snapshot: place a snapshot ZIP + manifest.json in ./data/ (same dir as this compose file)
      # and restart to restore. Override INSTANCE_HOST_PATH to use a different host directory.
      - '${INSTANCE_HOST_PATH:-./data}:${INSTANCE_PATH:-${APP_DIR:-/usr/src/playground-be}/instance}'
    depends_on:
      autowrx-db:
        condition: service_healthy
    networks:
      - autowrx-network
    restart: always

  # MongoDB - Database
  autowrx-db:
    # platform: linux/amd64  # Commented out for local testing on non-AMD64 machines
    container_name: ${NAME:-prod}-autowrx-db
    image: mongo:4.4.6-bionic
    # ports:
    #   - "${MONGODB_PORT:-27010}:27017"
    volumes:
      - autowrx-dbdata:/data/db
    networks:
      - autowrx-network
    restart: always
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  autowrx-dbdata:
    name: ${NAME:-prod}-autowrx-dbdata
  autowrx-uploads:
    name: ${NAME:-prod}-autowrx-uploads
  autowrx-plugins:
    name: ${NAME:-prod}-autowrx-plugins
  autowrx-builtin-widgets:
    name: ${NAME:-prod}-autowrx-builtin-widgets
  autowrx-vss-data:
    name: ${NAME:-prod}-autowrx-vss-data

networks:
  autowrx-network:
    name: ${NAME:-prod}-autowrx-network
    driver: bridge
