services:
  coder-init:
    # Init container to fix volume permissions
    image: alpine:3.23.3
    user: "0:0"
    volumes:
      - coder_data:/home/coder/.config
    command: >
      sh -c "
      mkdir -p /home/coder/.config &&
      chown -R 1000:1000 /home/coder/.config &&
      find /home/coder/.config -type d -exec chmod 700 {} \; 2>/dev/null || true &&
      find /home/coder/.config -type f -exec chmod 600 {} \; 2>/dev/null || true &&
      chmod 755 /home/coder 2>/dev/null || true &&
      chmod 700 /home/coder/.config
      "
    restart: "no"

  coder:
    # This is the Coder Control Plane
    image: ghcr.io/coder/coder:v2.31.5
    container_name: coder
    depends_on:
      - coder-init
    environment:
      # The URL where users access the dashboard
      - CODER_ACCESS_URL=http://localhost:7080
      # Address to listen on inside the container
      - CODER_HTTP_ADDRESS=0.0.0.0:7080
      # Allow iframe embedding from your domain
      - CODER_BROWSER_ONLY=true
    # Override entrypoint to pass flags for path-based app sharing
    # The Coder binary is located at /opt/coder
    entrypoint:
      [
        "/opt/coder",
        "server",
        "--dangerous-allow-path-app-sharing",
        "--dangerous-allow-path-app-site-owner-access",
      ]
    ports:
      - "7080:7080"
    volumes:
      # Critical: Mount the docker socket so Coder can spawn sibling containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist Coder's internal database
      - coder_data:/home/coder/.config
    group_add:
      - "0" # Add root group for docker socket access
    restart: unless-stopped
    networks:
      - coder_network

volumes:
  coder_data:

networks:
  coder_network:
    name: coder_network
    driver: bridge
