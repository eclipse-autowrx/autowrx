services:
  coder-init:
    image: alpine:3.23.3
    user: "0:0"
    volumes:
      - coder_data:/home/coder/.config
    command: >
      sh -c "
      mkdir -p /home/coder/.config &&
      chown -R 1000:1000 /home/coder/.config &&
      find /home/coder/.config -type d -exec chmod 700 {} \; 2>/dev/null || true &&
      find /home/coder/.config -type f -exec chmod 600 {} \; 2>/dev/null || true &&
      chmod 755 /home/coder 2>/dev/null || true &&
      chmod 700 /home/coder/.config
      "
    restart: "no"

  coder:
    image: ghcr.io/coder/coder:v2.31.5
    container_name: coder
    depends_on:
      - coder-init
    environment:
      - CODER_ACCESS_URL=http://localhost:7080
      - CODER_HTTP_ADDRESS=0.0.0.0:7080
      - CODER_BROWSER_ONLY=true
      - CODER_USERNAME=admin
      - CODER_EMAIL=admin@coder.com
      - CODER_PASSWORD=123123123
    entrypoint:
      - sh
      - -c
      - |
        /opt/coder server create-admin-user --username "$$CODER_USERNAME" --email "$$CODER_EMAIL" --password "$$CODER_PASSWORD" || true
        exec /opt/coder server --dangerous-allow-path-app-sharing --dangerous-allow-path-app-site-owner-access
    ports:
      - "7080:7080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - coder_data:/home/coder/.config
    group_add:
      - "0"
    restart: unless-stopped
    networks:
      - coder_network

volumes:
  coder_data:

networks:
  coder_network:
    name: coder_network
    driver: bridge
